# Map configuration for Bulgaria TITAN display
# Centered on Yarlovo radar (Sofia)
# Projection: CARTESIAN, origin at radar site

map_file_subdir $(PROJ_DIR)/display/maps

# Bulgaria borders and features
BULGARIA_BORDER  Bulgaria_Border  bulgaria_border.map   1  0.0  10000.0  green
BULGARIA_CITIES  Bulgaria_Cities  bulgaria_cities.map   1  0.0  10000.0  yellow
RANGE_RINGS      Range_Rings      range_rings.map       1  0.0  10000.0  gray
NEIGHBORS        Neighbors        neighbors.map         0  0.0  10000.0  cyan
