version: '3.8'

services:
  titan-bulgaria:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: titan-bulgaria
    ports:
      - "5900:5900"   # VNC - connect with VNC viewer to localhost:5900
    volumes:
      # Bind mount: drop radar HDF5 files here from Windows Explorer
      # Folder will be created automatically on first run
      - ${TITAN_DATA_DIR:-./data/titan}:/data/titan
      # Project config - live editable from your editor
      - ./projects/bulgaria/projDir:/opt/titan/projDir
    environment:
      - DISPLAY=:1
      - PROJ_DIR=/opt/titan/projDir
      - DATA_DIR=/data/titan
      - LROSE_INSTALL_DIR=/opt/lrose
    restart: unless-stopped
    shm_size: '256mb'
